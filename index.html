<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson Builder</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0;}
.container{max-width:900px;margin:40px auto;background:white;padding:24px;border-radius:16px;}

video,iframe{width:100%;border-radius:10px;}

h2,h3{margin-top:0;}

button{
  padding:8px 12px;margin:4px;border:none;border-radius:6px;
  background:#4f46e5;color:white;cursor:pointer;
}
.secondary{background:#e5e7eb;color:black;}
button:disabled{opacity:0.5;}

.section-builder{
  background:#f1f5f9;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
}

.section-active{outline:2px solid #4f46e5;}

label{
  font-weight:bold;
  display:block;
  margin-top:6px;
}

textarea,input{
  width:100%;
  padding:6px;
  margin-top:4px;
}

.instructions{
  background:#eef2ff;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

.gap{
  border-bottom:2px solid #333;
  padding:2px 12px;
  cursor:pointer;
}

input.gap-input{
  border:none;
  border-bottom:2px solid #333;
  width:100px;
}

.correct{color:green;}
.incorrect{color:red;}

.controls{text-align:center;margin:15px 0;}
#text{font-size:18px;line-height:1.8;}
#result{text-align:center;margin-top:20px;font-weight:bold;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
// ==========================
// SAFE ENCODE
// ==========================
function encodeData(obj){
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function decodeData(str){
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}

// ==========================
// MODE
// ==========================
const params=new URLSearchParams(window.location.search);
const raw=params.get("data");

if(raw){
  try{
    loadStudent(decodeData(raw), false);
  }catch(e){
    document.getElementById("app").innerHTML="<h2>Error loading lesson</h2>";
  }
}else{
  loadBuilder();
}

// ==========================
// BUILDER
// ==========================
function loadBuilder(saved=null){

  app.innerHTML=`
    <h2>🎧 Lesson Builder</h2>

    <div class="instructions">
      <strong>Instructions:</strong><br>
      • Paste a YouTube or MP4 video link<br>
      • Write text using <b>___</b> for gaps<br>
      • Add answers in order, separated by commas<br>
      • Set start and end times for each section
    </div>

    <label>Video URL (YouTube supported)</label>
    <input id="videoUrl">

    <h3>Sections</h3>
    <div id="sections"></div>

    <button onclick="addSection()">+ Add Section</button>

    <br><br>
    <button onclick="preview()">👀 Preview</button>
    <button onclick="generate()">🔗 Generate Link</button>

    <p id="output"></p>
  `;

  if(saved){
    videoUrl.value=saved.videoUrl;
    saved.sections.forEach(s=>addSection(s));
  }else{
    addSection();
  }
}

function addSection(data=null){
  const div=document.createElement("div");
  div.className="section-builder";

  div.innerHTML=`
    <h3>Section</h3>

    <label>Text (use ___ for gaps)</label>
    <textarea class="text">${data?.text||""}</textarea>

    <label>Answers (comma separated)</label>
    <input class="answers" value="${data?.answers?.join(",")||""}">

    <label>Start Time (seconds)</label>
    <input class="start" type="number" value="${data?.start||0}">

    <label>End Time (seconds)</label>
    <input class="end" type="number" value="${data?.end||0}">
  `;

  sections.appendChild(div);
}

function collect(){
  const videoUrl=document.getElementById("videoUrl").value.trim();

  const sectionsData=[];
  document.querySelectorAll(".section-builder").forEach(s=>{
    sectionsData.push({
      text:s.querySelector(".text").value,
      answers:s.querySelector(".answers").value.split(",").map(a=>a.trim()),
      start:+s.querySelector(".start").value,
      end:+s.querySelector(".end").value
    });
  });

  return {videoUrl,sections:sectionsData};
}

function generate(){
  const lesson=collect();
  const link=`${location.origin}${location.pathname}?data=${encodeData(lesson)}`;
  output.innerHTML=`<a href="${link}" target="_blank">Open Lesson</a><br>${link}`;
}

function preview(){
  const lesson = collect();

  // clear app completely before reload
  document.getElementById("app").innerHTML = "";

  setTimeout(()=>{
    loadStudent(lesson, true);
  }, 0);
}

// ==========================
// STUDENT
// ==========================
let ytPlayer=null,currentSection=0,stopTime=0;
let answers=[],order=[],lessonData=null,checked=false;

function loadStudent(lesson,isPreview){
  lessonData=lesson;
  answers=[];
order=[];
checked=false;
currentSection=0;

// reset YouTube player if exists
if (ytPlayer && ytPlayer.destroy) {
  ytPlayer.destroy();
  ytPlayer = null;
}

  const isYT=lesson.videoUrl.includes("youtube");

  app.innerHTML=`
    <h2>🎧 Listening Practice ${isPreview?"(Preview)":""}</h2>

    ${isPreview?`<button onclick="loadBuilder(lessonData)" class="secondary">⬅ Back</button>`:""}

    ${isYT?`<div id="player"></div>`:
    `<video id="video" controls><source src="${lesson.videoUrl}"></video>`}

    <div class="controls" id="buttons"></div>
    <div id="text"></div>

    <div class="controls">
      <button onclick="checkAnswers()">Check Answers</button>
      <button class="secondary" onclick="repeatSection()">Repeat Section</button>
      <button id="revealBtn" class="secondary" onclick="revealAnswers()" disabled>Reveal Answers</button>
    </div>

    <p id="result"></p>
  `;

  if(isYT) loadYT(lesson.videoUrl);

  renderButtons();
  renderText();
}

function renderButtons(){
  lessonData.sections.forEach((sec,i)=>{
    const b=document.createElement("button");
    b.textContent="Section "+(i+1);
    b.onclick=()=>playSection(i);
    buttons.appendChild(b);
  });
}

function renderText(){
  lessonData.sections.forEach((sec,si)=>{
    let t=sec.text;

    sec.answers.forEach((a,ai)=>{
      const id=`q${si}_${ai}`;
      let gapIndex = 0;

t = t.replace(/_+/g, () => {
  const id = `q${si}_${gapIndex}`;
  const html = `<span class="gap" data-id="${id}">_____</span>`;

  answers.push({ id, val: sec.answers[gapIndex] || "" });
  order.push(id);

  gapIndex++;
  return html;
});
      answers.push({id,val:a});
      order.push(id);
    });

    const div=document.createElement("div");
    div.className="section";
    div.innerHTML=t+"<br><br>";
    text.appendChild(div);
  });
function activateGaps(){
  document.querySelectorAll(".gap").forEach(g=>{
    g.addEventListener("click", function(){
      const id = this.dataset.id;

      const input = document.createElement("input");
      input.id = id;
      input.className = "gap-input";

      input.addEventListener("input", ()=> moveNext(id));

      this.replaceWith(input);
      input.focus();
    }, { once: true });
  });
  activateGaps();
}
}

function moveNext(id){
  const i=order.indexOf(id);
  const next=document.getElementById(order[i+1]);
  if(next) next.focus();
}

function playSection(i){
  currentSection=i;

  document.querySelectorAll("#text .section").forEach((el,idx)=>{
    el.classList.toggle("section-active", idx===i);
  });

  const sec=lessonData.sections[i];
  stopTime=sec.end;

  if(ytPlayer){
    ytPlayer.seekTo(sec.start,true);
    ytPlayer.playVideo();

    const t=setInterval(()=>{
      if(ytPlayer.getCurrentTime()>=stopTime){
        ytPlayer.pauseVideo();
        clearInterval(t);
      }
    },200);

  }else{
    const v=document.getElementById("video");
    v.currentTime=sec.start;
    v.play();

    const t=setInterval(()=>{
      if(v.currentTime>=stopTime){
        v.pause();
        clearInterval(t);
      }
    },200);
  }
}

function repeatSection(){
  playSection(currentSection);
}

  let ytLoaded = false;

function loadYT(url){

  function createPlayer(){
    ytPlayer = new YT.Player("player", {
      height: "400",
      width: "100%",
      videoId: (url.match(/(?:v=|youtu.be\/)([^&]+)/) || [])[1]
    });
  }

  if (window.YT && window.YT.Player) {
    createPlayer();
  } else if (!ytLoaded) {
    ytLoaded = true;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    window.onYouTubeIframeAPIReady = createPlayer;
  }
}

function checkAnswers(){
  let score=0;
  answers.forEach(a=>{
    const i=document.getElementById(a.id);
    if(!i) return;

    if(i.value.toLowerCase().trim()===a.val){
      i.classList.add("correct"); score++;
    }else{
      i.classList.add("incorrect");
    }
  });

  result.innerText=`Score: ${score} / ${answers.length}`;
  checked=true;
  revealBtn.disabled=false;
}

function revealAnswers(){
  if(!checked) return;

  answers.forEach(a=>{
    let i=document.getElementById(a.id);

    if(!i){
      const g=document.querySelector(`[data-id="${a.id}"]`);
      const n=document.createElement("input");
      n.value=a.val;
      n.classList.add("correct");
      g.replaceWith(n);
    }else{
      i.value=a.val;
      i.classList.add("correct");
    }
  });

  result.innerText+=" | Answers revealed";
}
</script>

</body>
</html>
