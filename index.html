<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson</title>

<style>
body{
  font-family:system-ui;
  background:#f8fafc;
  margin:0;
}
.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:24px;
  border-radius:16px;
}

video, iframe{
  width:100%;
  border-radius:10px;
}

.controls{
  text-align:center;
  margin:15px 0;
}

button{
  padding:8px 12px;
  margin:4px;
  border:none;
  border-radius:6px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.secondary{
  background:#e5e7eb;
  color:black;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.section-active{
  outline:2px solid #4f46e5;
  border-radius:8px;
}

.gap{
  border-bottom:2px solid #333;
  padding:2px 12px;
  cursor:pointer;
}

input{
  border:none;
  border-bottom:2px solid #333;
  width:100px;
}

.correct{color:green;}
.incorrect{color:red;}

#text{
  font-size:18px;
  line-height:1.8;
}

#result{
  margin-top:20px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h2>🎧 Listening Practice</h2>

<div id="videoContainer"></div>

<div class="controls" id="sectionButtons"></div>

<div id="text"></div>

<div class="controls">
  <button onclick="checkAnswers()">Check Answers</button>
  <button class="secondary" onclick="repeatSection()">Repeat Section</button>
  <button id="revealBtn" class="secondary" onclick="revealAnswers()" disabled>Reveal Answers</button>
</div>

<p id="result"></p>

</div>

<script>
// ==========================
// EDIT LESSON HERE
// ==========================
const lesson = {
  videoUrl: "https://www.youtube.com/watch?v=aqz-KE-bpKQ",
  sections: [
    {
      text: "Lesson text ___ be displayed ___ like this.",
      answers: ["should","exactly"],
      start: 0,
      end: 10
    },
    {
      text: "Students ___ type directly into the text.",
      answers: ["can"],
      start: 10,
      end: 20
    }
  ]
};

// ==========================
// GLOBALS
// ==========================
let ytPlayer=null;
let currentSection=0;
let stopTime=0;
let answers=[];
let inputOrder=[];
let answersChecked=false;

// ==========================
// INIT
// ==========================
init();

function init(){
  renderVideo();
  renderButtons();
  renderText();
}

// ==========================
// VIDEO
// ==========================
function renderVideo(){
  const container=document.getElementById("videoContainer");

  if(lesson.videoUrl.includes("youtube")){
    container.innerHTML = `<div id="player"></div>`;
    loadYouTube();
  } else {
    container.innerHTML = `
      <video id="video" controls>
        <source src="${lesson.videoUrl}">
      </video>
    `;
  }
}

function loadYouTube(){
  const tag=document.createElement("script");
  tag.src="https://www.youtube.com/iframe_api";
  document.body.appendChild(tag);

  window.onYouTubeIframeAPIReady=()=>{
    ytPlayer=new YT.Player("player",{
      height:"400",
      width:"100%",
      videoId:getYTid(lesson.videoUrl)
    });
  };
}

function getYTid(url){
  const m=url.match(/(?:v=|youtu.be\/)([^&]+)/);
  return m?m[1]:null;
}

// ==========================
// BUTTONS
// ==========================
function renderButtons(){
  const container=document.getElementById("sectionButtons");

  lesson.sections.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.innerText="Section "+(i+1);
    btn.onclick=()=>playSection(i);
    container.appendChild(btn);
  });
}

// ==========================
// TEXT + GAPS
// ==========================
function renderText(){
  const container=document.getElementById("text");

  lesson.sections.forEach((sec,si)=>{
    let text=sec.text;

    sec.answers.forEach((ans,ai)=>{
      const id=`q${si}_${ai}`;
      text=text.replace("___", `<span class="gap" data-id="${id}">_____</span>`);
      answers.push({id, value:ans});
      inputOrder.push(id);
    });

    const div=document.createElement("div");
    div.className="section-block";
    div.innerHTML=text + "<br><br>";
    container.appendChild(div);
  });

  activateGapClicks();
}

function activateGapClicks(){
  document.querySelectorAll(".gap").forEach(g=>{
    g.onclick=()=>{
      const id=g.dataset.id;
      const input=document.createElement("input");
      input.id=id;

      input.addEventListener("input", ()=>{
        moveToNextInput(id);
      });

      g.replaceWith(input);
      input.focus();
    };
  });
}

// auto move
function moveToNextInput(currentId){
  const index=inputOrder.indexOf(currentId);
  const nextId=inputOrder[index+1];
  if(nextId){
    const next=document.getElementById(nextId);
    if(next) next.focus();
  }
}

// ==========================
// PLAYBACK
// ==========================
function playSection(i){
  currentSection=i;

  document.querySelectorAll(".section-block").forEach((el,index)=>{
    el.classList.toggle("section-active", index===i);
  });

  const sec=lesson.sections[i];
  stopTime=sec.end;

  if(ytPlayer){
    ytPlayer.seekTo(sec.start,true);
    ytPlayer.playVideo();

    const int=setInterval(()=>{
      if(ytPlayer.getCurrentTime()>=stopTime){
        ytPlayer.pauseVideo();
        clearInterval(int);
      }
    },200);

  } else {
    const v=document.getElementById("video");
    v.currentTime=sec.start;
    v.play();

    const int=setInterval(()=>{
      if(v.currentTime>=stopTime){
        v.pause();
        clearInterval(int);
      }
    },200);
  }
}

function repeatSection(){
  playSection(currentSection);
}

// ==========================
// ANSWERS
// ==========================
function checkAnswers(){
  let score=0;

  answers.forEach(a=>{
    const input=document.getElementById(a.id);
    if(!input) return;

    if(input.value.toLowerCase().trim()===a.value){
      input.classList.add("correct");
      input.classList.remove("incorrect");
      score++;
    } else {
      input.classList.add("incorrect");
    }
  });

  document.getElementById("result").innerText =
    `Score: ${score} / ${answers.length}`;

  answersChecked=true;
  document.getElementById("revealBtn").disabled=false;
}

function revealAnswers(){
  if(!answersChecked) return;

  answers.forEach(a=>{
    let input=document.getElementById(a.id);

    if(!input){
      const gap=document.querySelector(`[data-id="${a.id}"]`);
      const newInput=document.createElement("input");
      newInput.id=a.id;
      newInput.value=a.value;
      newInput.classList.add("correct");
      gap.replaceWith(newInput);
    } else {
      input.value=a.value;
      input.classList.add("correct");
    }
  });

  document.getElementById("result").innerText += " | Answers revealed";
}
</script>

</body>
</html>
