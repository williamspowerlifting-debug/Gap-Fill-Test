<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson</title>

<style>
body{
  font-family:system-ui;
  background:#f8fafc;
  margin:0;
}
.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:24px;
  border-radius:16px;
}

button{
  padding:8px 12px;
  margin:4px;
  border:none;
  background:#4f46e5;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.secondary{
  background:#e5e7eb;
  color:black;
}

.section-buttons{
  text-align:center;
  margin:15px 0;
}

.gap{
  border-bottom:2px solid #333;
  padding:2px 10px;
  cursor:pointer;
}

input{
  border:none;
  border-bottom:2px solid #333;
  width:100px;
}

.correct{color:green;}
.incorrect{color:red;}

#text{
  line-height:1.8;
  font-size:18px;
}

#result{
  margin-top:20px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
// ==========================
// CONFIG (EDIT THIS)
// ==========================
const lessonData = {
  videoUrl: "https://www.youtube.com/watch?v=aqz-KE-bpKQ",
  sections: [
    {
      text: "Lesson text ___ be displayed ___ like this.",
      answers: ["should","exactly"],
      start: 0,
      end: 10
    },
    {
      text: "Students ___ type answers directly.",
      answers: ["can"],
      start: 10,
      end: 20
    }
  ]
};

// ==========================
// GLOBALS
// ==========================
let ytPlayer=null;
let currentSection=0;
let stopTime=0;
let allInputs=[];
let allAnswers=[];

// ==========================
// INIT
// ==========================
init();

function init(){

  const app=document.getElementById("app");

  const isYT = lessonData.videoUrl.includes("youtube");

  app.innerHTML=`
    <h2>🎧 Listening Practice</h2>

    ${isYT ? `<div id="player"></div>` : `
      <video id="video" controls width="100%">
        <source src="${lessonData.videoUrl}">
      </video>
    `}

    <div class="section-buttons" id="buttons"></div>

    <div id="text"></div>

    <div style="text-align:center;">
      <button onclick="checkAnswers()">Check Answers</button>
      <button class="secondary" onclick="repeatSection()">Repeat Section</button>
      <button class="secondary" onclick="revealAnswers()">Reveal Answers</button>
    </div>

    <p id="result"></p>
  `;

  buildSections();
  buildText();

  if(isYT) loadYouTube();
}

// ==========================
// BUILD UI
// ==========================
function buildSections(){
  const btns=document.getElementById("buttons");

  lessonData.sections.forEach((s,i)=>{
    const b=document.createElement("button");
    b.innerText="Section "+(i+1);
    b.onclick=()=>startSection(i);
    btns.appendChild(b);
  });
}

function buildText(){

  const container=document.getElementById("text");

  lessonData.sections.forEach((sec,si)=>{

    let text=sec.text;

    sec.answers.forEach((ans,ai)=>{
      const id=`s${si}q${ai}`;
      text=text.replace("___", `<span class="gap" data-id="${id}">_____</span>`);
      allAnswers.push({id, answer:ans});
    });

    const div=document.createElement("div");
    div.innerHTML=text + "<br><br>";
    container.appendChild(div);
  });

  // click to turn into input
  document.querySelectorAll(".gap").forEach(g=>{
    g.onclick=()=>{
      const id=g.dataset.id;
      g.outerHTML=`<input id="${id}">`;
    };
  });
}

// ==========================
// VIDEO CONTROL
// ==========================
function startSection(i){
  currentSection=i;
  const sec=lessonData.sections[i];
  stopTime=sec.end;

  if(ytPlayer){
    ytPlayer.seekTo(sec.start,true);
    ytPlayer.playVideo();

    const int=setInterval(()=>{
      if(ytPlayer.getCurrentTime()>=stopTime){
        ytPlayer.pauseVideo();
        clearInterval(int);
      }
    },200);

  } else {
    const v=document.getElementById("video");
    v.currentTime=sec.start;
    v.play();

    const int=setInterval(()=>{
      if(v.currentTime>=stopTime){
        v.pause();
        clearInterval(int);
      }
    },200);
  }
}

function repeatSection(){
  startSection(currentSection);
}

// ==========================
// YOUTUBE
// ==========================
function loadYouTube(){
  const tag=document.createElement("script");
  tag.src="https://www.youtube.com/iframe_api";
  document.body.appendChild(tag);

  window.onYouTubeIframeAPIReady=()=>{
    ytPlayer=new YT.Player("player",{
      height:"400",
      width:"100%",
      videoId:getYTid(lessonData.videoUrl)
    });
  };
}

function getYTid(url){
  const m=url.match(/(?:v=|youtu.be\/)([^&]+)/);
  return m?m[1]:null;
}

// ==========================
// ANSWERS
// ==========================
function checkAnswers(){
  let score=0;

  allAnswers.forEach(obj=>{
    const input=document.getElementById(obj.id);
    if(!input) return;

    if(input.value.toLowerCase().trim()===obj.answer){
      input.classList.add("correct");
      input.classList.remove("incorrect");
      score++;
    } else {
      input.classList.add("incorrect");
    }
  });

  document.getElementById("result").innerText=
    `Score: ${score} / ${allAnswers.length}`;
}

function revealAnswers(){
  allAnswers.forEach(obj=>{
    let input=document.getElementById(obj.id);

    if(!input){
      const gap=document.querySelector(`[data-id="${obj.id}"]`);
      gap.outerHTML=`<input id="${obj.id}" value="${obj.answer}" class="correct">`;
    } else {
      input.value=obj.answer;
      input.classList.add("correct");
    }
  });
}
</script>

</body>
</html>
